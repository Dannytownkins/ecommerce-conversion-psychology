<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 1764" fill="none">
  <!-- Minimal flat phone bezel frame for mobile screenshots -->
  <!-- Screenshot area: x=30, y=80, width=800, height=1600 -->
  <rect x="0" y="0" width="860" height="1764" rx="50" fill="#1a1a1a"/>
  <rect x="6" y="6" width="848" height="1752" rx="46" fill="#111111" stroke="#333333" stroke-width="2"/>
  <!-- Top notch area -->
  <rect x="300" y="16" width="260" height="28" rx="14" fill="#1a1a1a"/>
  <!-- Screen cutout (transparent for screenshot) -->
  <rect x="30" y="80" width="800" height="1600" rx="8" fill="black"/>
  <!-- Bottom bar -->
  <rect x="340" y="1700" width="180" height="5" rx="2.5" fill="#333333"/>
</svg>
