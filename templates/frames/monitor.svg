<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2040 1240" fill="none">
  <!-- Minimal flat monitor frame for desktop screenshots (1920x1080) -->
  <!-- Screenshot area: x=30, y=40, width=1980, height=1100 -->
  <rect x="0" y="0" width="2040" height="1160" rx="12" fill="#1a1a1a"/>
  <rect x="4" y="4" width="2032" height="1152" rx="10" fill="#111111" stroke="#333333" stroke-width="2"/>
  <!-- Camera dot -->
  <circle cx="1020" cy="20" r="4" fill="#333333"/>
  <!-- Screen cutout (transparent for screenshot) -->
  <rect x="30" y="40" width="1980" height="1100" rx="4" fill="black"/>
  <!-- Monitor stand -->
  <rect x="870" y="1160" width="300" height="40" fill="#1a1a1a"/>
  <rect x="770" y="1200" width="500" height="12" rx="6" fill="#1a1a1a"/>
  <rect x="770" y="1200" width="500" height="12" rx="6" stroke="#333333" stroke-width="1"/>
</svg>
